<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SaasHub{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50:'#f0fdf4', 500:'#22c55e', 600:'#16a34a', 700:'#15803d' }
                    }
                }
            }
        }
    </script>
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="fixed top-4 right-4 z-50 space-y-2">
        {% for category, message in messages %}
        <div class="px-4 py-3 rounded-lg shadow-lg text-white text-sm font-medium
            {% if category == 'success' %}bg-green-500
            {% elif category == 'danger' %}bg-red-500
            {% elif category == 'warning' %}bg-yellow-500
            {% else %}bg-green-500{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    {% block body %}{% endblock %}

    {% block scripts %}{% endblock %}
</body>
</html>
