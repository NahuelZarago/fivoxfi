<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Fivox</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-50 to-green-50/40 min-h-screen flex items-center justify-center p-4">

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="fixed top-4 right-4 z-50 space-y-2 max-w-sm">
    {% for c, m in messages %}
    <div class="px-4 py-3 rounded-xl shadow-lg text-white text-sm font-medium
        {% if c=='success' %}bg-green-600{% elif c=='danger' %}bg-red-500{% elif c=='warning' %}bg-amber-500{% else %}bg-gray-700{% endif %}">
        {{ m }}
    </div>
    {% endfor %}
</div>
{% endif %}
{% endwith %}

<div class="w-full max-w-sm">
    <div class="text-center mb-8">
        <a href="{{ url_for('public.index') }}" class="inline-flex items-center gap-2 mb-4">
            <div class="w-9 h-9 bg-green-600 rounded-xl flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                </svg>
            </div>
            <span class="text-2xl font-bold text-gray-900">Fivox</span>
        </a>
        <p class="text-gray-500 text-sm">Bienvenido de vuelta</p>
    </div>

    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
        <h2 class="text-lg font-bold text-gray-900 mb-6">Iniciar sesión</h2>
        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
                <input type="email" name="email" required autofocus
                       class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 bg-gray-50"
                       placeholder="tu@gmail.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Contraseña</label>
                <input type="password" name="password" required
                       class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 bg-gray-50"
                       placeholder="••••••••">
            </div>
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" name="remember" class="rounded text-green-600">
                <span class="text-sm text-gray-600">Recordarme</span>
            </label>
            <button type="submit"
                    class="w-full bg-green-600 text-white font-semibold py-3 rounded-xl hover:bg-green-700 transition-colors text-sm">
                Ingresar
            </button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-6">
            ¿No tenés cuenta?
            <a href="{{ url_for('auth.register') }}" class="text-green-600 font-semibold hover:underline">Registrarse</a>
        </p>
    </div>
</div>
</body>
</html>
