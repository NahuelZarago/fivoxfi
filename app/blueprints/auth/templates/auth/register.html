<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta — Fivox</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="fixed top-4 right-4 z-50 space-y-2 max-w-sm">
    {% for category, message in messages %}
    <div class="px-4 py-3 rounded-xl shadow-lg text-white text-sm font-medium
        {% if category == 'success' %}bg-green-600{% elif category == 'danger' %}bg-red-500{% elif category == 'warning' %}bg-amber-500{% else %}bg-green-700{% endif %}">
        {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}
{% endwith %}

<div class="w-full max-w-sm">

    <div class="text-center mb-8">
        <div class="inline-flex items-center gap-2 mb-4">
            <div class="w-9 h-9 bg-green-600 rounded-xl flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                </svg>
            </div>
            <a href="{{ url_for('public.index') }}" class="text-2xl font-bold text-gray-900 tracking-tight">Fivox</a>
        </div>
        <p class="text-gray-500 text-sm">Creá tu cuenta y empezá gratis</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
        <h2 class="text-lg font-bold text-gray-900 mb-6">Crear cuenta</h2>

        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Nombre del negocio</label>
                <input type="text" name="business_name" required autofocus
                       class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                       placeholder="Ej: Almacén El Sol">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Tu nombre</label>
                <input type="text" name="username" required
                       class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                       placeholder="Juan García">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
                <input type="email" name="email" required
                       class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                       placeholder="tu@email.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Contraseña</label>
                <input type="password" name="password" required minlength="8"
                       class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                       placeholder="Mínimo 8 caracteres">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Confirmar contraseña</label>
                <input type="password" name="confirm_password" required
                       class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                       placeholder="Repetí tu contraseña">
            </div>
            <button type="submit"
                    class="w-full bg-green-600 text-white font-semibold py-2.5 rounded-xl hover:bg-green-700 transition-colors text-sm mt-2">
                Crear cuenta
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            ¿Ya tenés cuenta?
            <a href="{{ url_for('auth.login') }}" class="text-green-600 font-semibold hover:underline">Iniciar sesión</a>
        </p>
    </div>
</div>
</body>
</html>
