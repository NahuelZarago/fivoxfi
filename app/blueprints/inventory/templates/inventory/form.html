{% extends "base_app.html" %}
{% block title %}{% if product %}Editar producto{% else %}Nuevo producto{% endif %}{% endblock %}

{% block content %}
<div class="max-w-2xl">
    <div class="mb-8">
        <a href="{{ url_for('inventory.product_list') }}"
           class="inline-flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-700 mb-4">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            Volver al inventario
        </a>
        <h1 class="text-2xl font-bold text-gray-900">
            {% if product %}Editar producto{% else %}Nuevo producto{% endif %}
        </h1>
    </div>

    <div class="bg-white rounded-2xl border border-gray-200 p-8">
        <form method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Nombre del producto <span class="text-red-500">*</span></label>
                <input type="text" name="name" required
                       value="{{ product.name if product else '' }}"
                       class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                       placeholder="Ej: Arroz 1kg">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Descripción</label>
                <textarea name="description" rows="2"
                          class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent resize-none"
                          placeholder="Descripción opcional">{{ product.description if product else '' }}</textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">SKU / Código de barra</label>
                <input type="text" name="sku"
                       value="{{ product.sku if product else '' }}"
                       class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent font-mono"
                       placeholder="7790001234567">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Precio de costo <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-2.5 text-gray-400 text-sm font-medium">$</span>
                        <input type="number" name="cost_price" step="0.01" min="0" required
                               value="{{ product.cost_price if product else '' }}"
                               class="w-full border border-gray-300 rounded-xl pl-8 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                               placeholder="0.00">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Precio de venta <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-2.5 text-gray-400 text-sm font-medium">$</span>
                        <input type="number" name="sale_price" step="0.01" min="0" required
                               value="{{ product.sale_price if product else '' }}"
                               class="w-full border border-gray-300 rounded-xl pl-8 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                               placeholder="0.00">
                    </div>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Stock actual <span class="text-red-500">*</span></label>
                <input type="number" name="stock" min="0" required
                       value="{{ product.stock if product else 0 }}"
                       class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit"
                        class="bg-green-600 text-white font-semibold px-6 py-2.5 rounded-xl hover:bg-green-700 transition-colors text-sm">
                    {% if product %}Guardar cambios{% else %}Crear producto{% endif %}
                </button>
                <a href="{{ url_for('inventory.product_list') }}"
                   class="border border-gray-200 text-gray-600 font-semibold px-6 py-2.5 rounded-xl hover:bg-gray-50 transition-colors text-sm">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
